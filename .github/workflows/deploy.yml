name: Deploy ADIC site to GoDaddy

# Auto-deploy on every push to main; also runnable manually from the Actions tab.
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      deployment_dest:
        description: 'Target server directory, leave blank for root directory'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Synchronize Files with GoDaddy WordPress Hosting Server
        uses: godaddy-wordpress/gd-wordpress-deployer@v1
        with:
          remote_host: "rp4.311.myftpupload.com"
          ssh_user: "git_deployer_7ed4fc4a31_1176735"
          ssh_private_key: ${{ secrets.PRIVATE_KEY }}
          # blank = deploy the whole repo to the site root (httpdocs)
          deployment_dest: ${{ github.event.inputs.deployment_dest }}
          # Keep health check ON: with an empty (root) destDir, the action
          # mis-parses "--skipHealthCheck" as the target dir and fails. Leaving
          # it on avoids that bug.
          enable_health_check: "yes"
          # Do NOT delete the existing WordPress files — they keep the health
          # check passing. Our .htaccess makes index.html the homepage, so the
          # static site is what visitors see; WordPress just sits unused beneath.
          cleanup_deleted_files: "no"
